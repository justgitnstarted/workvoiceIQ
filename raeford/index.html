<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorkVoiceIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #34322D;
    --ink-soft: #6b6657;
    --paper: #F5F2EA;
    --surface: #FFFFFF;
    --line: #DAD3C5;
    --accent: #A8403A;
    --khaki: #ABA083;
    --notice-bg: #ECE6D8;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: "DM Sans", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.55;
    font-size: 18px;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 20px; }

  .langbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--accent);
    border-bottom: 3px solid var(--khaki);
  }
  .langbar .wrap {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 12px; padding-bottom: 12px; gap: 12px;
  }
  .brand {
    font-family: "IBM Plex Mono", monospace;
    color: #fff; letter-spacing: 0.14em; font-size: 13px; text-transform: uppercase;
  }
  .langs { display: flex; gap: 6px; }
  .langs button {
    font: inherit; font-size: 14px;
    color: #fff; background: transparent;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 999px; padding: 6px 12px; cursor: pointer;
  }
  .langs button[aria-pressed="true"] { background: #fff; color: var(--accent); border-color: #fff; }
  .langs button:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  header.hero { padding: 48px 0 8px; }
  .eyebrow {
    font-family: "IBM Plex Mono", monospace; font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent);
  }
  h1 { font-size: clamp(30px, 6vw, 44px); line-height: 1.08; margin: 10px 0 0; font-weight: 700; letter-spacing: -0.01em; }
  .lede { color: var(--ink-soft); margin-top: 14px; font-size: 19px; }

  .notice {
    background: var(--notice-bg);
    border: 1px solid var(--line);
    border-left: 6px solid var(--accent);
    border-radius: 6px;
    padding: 22px 24px;
    margin: 28px 0;
  }
  .notice .label {
    font-family: "IBM Plex Mono", monospace; font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent);
    margin-bottom: 8px;
  }
  .notice p { margin: 0; font-size: 16.5px; }

  section { padding: 26px 0; border-top: 1px solid var(--line); }
  h2 { font-size: 22px; margin: 0 0 12px; font-weight: 700; }
  p { margin: 0 0 14px; }

  .vote {
    background: var(--ink); color: #fff;
    border-radius: 8px; padding: 28px 26px; margin: 30px 0;
  }
  .vote h2 { color: #fff; }
  .vote p { color: #eee7da; margin-bottom: 0; }

  footer { padding: 30px 0 60px; color: var(--ink-soft); font-size: 14px; }

  /* Testimonials */
  .testi-cards { display: grid; gap: 16px; margin-top: 18px; }
  .testimonial {
    margin: 0; padding: 22px 24px;
    background: var(--surface); border: 1px solid var(--line);
    border-left: 6px solid var(--accent); border-radius: 8px;
  }
  .testimonial blockquote { margin: 0; font-size: 18px; line-height: 1.55; white-space: pre-line; }
  .testimonial figcaption { margin-top: 12px; }
  .t-name { font-weight: 700; }
  .t-role { color: var(--ink-soft); }
  .t-role:not(:empty)::before { content: " \00b7 "; color: var(--ink-soft); }
  .t-listen { font-size: 14px; color: var(--ink-soft); margin: 16px 0 6px; }
  .testimonial audio { width: 100%; }
  .tts-row { margin-top: 8px; }
  .btn-read, .btn-stop {
    font: inherit; font-size: 15px; cursor: pointer;
    border-radius: 999px; padding: 8px 16px; margin-right: 8px;
  }
  .btn-read { background: var(--accent); color: #fff; border: 1px solid var(--accent); }
  .btn-stop { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-read:focus-visible, .btn-stop:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .notice-listen { margin-bottom: 16px; }
  .btn-listen {
    font: inherit; font-weight: 700; font-size: 18px; cursor: pointer;
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 15px 20px; width: 100%;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-listen::before { content: "\25B6"; font-size: 14px; }
  .btn-listen:focus-visible { outline: 3px solid var(--ink); outline-offset: 2px; }
  #disc-stop { margin-top: 8px; }

  [hidden] { display: none !important; }

  @media (prefers-reduced-motion: no-preference) {
    header.hero, .notice, section, .vote { animation: rise .5s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  }
</style>
</head>
<body>

  <div class="langbar">
    <div class="wrap">
      <span class="brand">WorkVoiceIQ</span>
      <div class="langs" role="group" aria-label="Language">
        <button type="button" data-lang="en" aria-pressed="true">English</button>
        <button type="button" data-lang="es" aria-pressed="false">Español</button>
        <button type="button" data-lang="ht" aria-pressed="false">Kreyòl</button>
      </div>
    </div>
  </div>

  <main class="wrap">

    <header class="hero">
      <div class="eyebrow" data-k="eyebrow"></div>
      <h1 data-k="title"></h1>
      <p class="lede" data-k="lede"></p>
    </header>

    <!-- SOURCE DISCLOSURE: kept at the top, before any content, on purpose. -->
    <div class="notice" role="note">
      <div class="notice-listen">
        <button type="button" id="disc-listen" class="btn-listen"></button>
        <button type="button" id="disc-stop" class="btn-stop"></button>
      </div>
      <div class="label" data-k="noticeLabel"></div>
      <p data-k="notice"></p>
    </div>

    <section>
      <h2 data-k="positionHeading"></h2>
      <p data-k="position"></p>
    </section>

    <div class="vote">
      <h2 data-k="voteHeading"></h2>
      <p data-k="vote"></p>
    </div>

    <section>
      <h2 data-k="testiHeading"></h2>
      <p data-k="testiFraming"></p>
      <div id="testi-cards" class="testi-cards"></div>
    </section>

    <footer>
      <p data-k="footer"></p>
    </footer>

  </main>

<script>
  var content = {
    en: {
      lang: "en",
      eyebrow: "Workplace information",
      title: "Your vote. Your decision.",
      lede: "Information to help you decide before the election.",
      noticeLabel: "Notice about this page",
      notice: "This page is published by WorkVoiceIQ, a workplace communications resource produced for Raeford Farms by its outside labor relations advisor. It is not independent of the company. Any clips and excerpts posted here are individual employees speaking in their own words, shared with their consent. Their views are their own, not statements by Raeford Farms.",
      noticeSpoken: "Quick note before you listen. This page was made for Raeford Farms by a company that Raeford hired. It is not neutral. The workers you will hear are giving their own opinions. They are not speaking for everyone. Your vote is your own. You can vote yes, or you can vote no. Both are your right. Listen, ask questions, and make sure you vote.",
      positionHeading: "Raeford Farms' position",
      position: "We would rather work directly with our employees than bring a union in between us. We believe we can hear concerns and solve problems together, without an outside organization in the middle. That is our honest preference. The decision itself is yours. Voting for the union or against it is your right, and your choice is protected either way.",
      voteHeading: "About voting",
      vote: "This is your vote. Hear both sides, ask questions, and decide for yourself. Then vote. However you choose, your voice only counts if you use it.",
      testiHeading: "What some employees told us",
      testiFraming: "These are individual employees' own views, shared with their consent. They speak for themselves, not for everyone at the plant.",
      footer: "Published by WorkVoiceIQ for Raeford Farms."
    },
    es: {
      lang: "es",
      eyebrow: "Información laboral",
      title: "Su voto. Su decisión.",
      lede: "Información para ayudarle a decidir antes de la elección.",
      noticeLabel: "Aviso sobre esta página",
      notice: "Esta página es publicada por WorkVoiceIQ, un recurso de comunicación laboral producido para Raeford Farms por su asesor externo en relaciones laborales. No es independiente de la empresa. Los audios y fragmentos que aparezcan aquí corresponden a empleados que hablan con sus propias palabras, compartidos con su consentimiento. Las opiniones son suyas y no constituyen declaraciones de Raeford Farms.",
      noticeSpoken: "Una nota rápida antes de escuchar. Esta página la hizo para Raeford Farms una compañía que Raeford contrató. No es neutral. Los trabajadores que va a escuchar dan su propia opinión. No hablan por todos. Su voto es suyo. Puede votar sí, o puede votar no. Las dos son su derecho. Escuche, haga preguntas, y asegúrese de votar.",
      positionHeading: "Posición de Raeford Farms",
      position: "Preferimos trabajar directamente con nuestros empleados en lugar de tener un sindicato de por medio. Creemos que podemos escuchar las inquietudes y resolver los problemas juntos, sin una organización externa en medio. Esa es nuestra preferencia sincera. La decisión, sin embargo, es suya. Votar a favor o en contra del sindicato es su derecho, y su elección está protegida en cualquiera de los dos casos.",
      voteHeading: "Sobre votar",
      vote: "Este es su voto. Escuche ambas partes, haga preguntas y decida por su cuenta. Luego vote. Sea cual sea su decisión, su voz solo cuenta si la usa.",
      testiHeading: "Lo que nos dijeron algunos empleados",
      testiFraming: "Estas son opiniones personales de los empleados, compartidas con su consentimiento. Hablan por sí mismos, no por todos en la planta.",
      footer: "Publicado por WorkVoiceIQ para Raeford Farms."
    },
    ht: {
      lang: "ht",
      eyebrow: "Enfòmasyon sou travay",
      title: "Vòt ou. Desizyon ou.",
      lede: "Enfòmasyon pou ede w deside anvan eleksyon an.",
      noticeLabel: "Avi sou paj sa a",
      notice: "Paj sa a pibliye pa WorkVoiceIQ, yon resous kominikasyon nan travay ki fèt pou Raeford Farms pa konseye ekstèn li nan relasyon travay. Li pa endepandan parapò ak konpayi an. Nenpòt odyo ak ekstrè ki sou paj la se anplwaye k ap pale ak pwòp pawòl pa yo, ki pataje ak konsantman yo. Opinyon yo se pa yo menm, yo pa deklarasyon Raeford Farms.",
      noticeSpoken: "Yon ti nòt anvan ou koute. Yon konpayi Raeford Farms te anboche ki fè paj sa a. Li pa net. Travayè ou pral tande yo ap bay pwòp opinyon pa yo. Yo pa pale pou tout moun. Vòt ou se pa ou. Ou ka vote wi, oswa ou ka vote non. Toulède se dwa ou. Koute, poze kesyon, epi asire w ou vote.",
      positionHeading: "Pozisyon Raeford Farms",
      position: "Nou ta pito travay dirèkteman ak anplwaye nou yo olye nou mete yon sendika nan mitan nou. Nou kwè nou ka koute enkyetid yo epi rezoud pwoblèm yo ansanm, san yon òganizasyon deyò nan mitan. Sa se preferans onèt nou. Men, desizyon an se pou ou. Vote pou sendika a oswa kont li se dwa ou, epi chwa ou pwoteje kèlkeswa jan ou vote.",
      voteHeading: "Sou vote",
      vote: "Sa se vòt pa ou. Koute toulède bò yo, poze kesyon, epi deside pou tèt ou. Apre sa, vote. Kèlkeswa sa ou chwazi, vwa ou konte sèlman si ou sèvi avè l.",
      testiHeading: "Sa kèk anplwaye di nou",
      testiFraming: "Sa se opinyon pèsonèl anplwaye yo, pataje ak konsantman yo. Yo pale pou tèt yo, se pa pou tout moun nan izin nan. (Tradiksyon kreyòl yo fèt pa machin epi yo poko revize pa yon moun.)",
      footer: "Pibliye pa WorkVoiceIQ pou Raeford Farms."
    }
  };

  /* Testimonial people. text_xx are the employees' own words (es from the existing
     page; ht is a machine translation pending native review). audio = filename in
     this same /raeford folder, or null for someone with no recording (Read-aloud). */
  var people = [
    {
      name: "Daniel",
      audio: "Daniel%20HORF%20Testimonial.mp3",
      sub_en: "Former chief steward, Greenville plant",
      sub_es: "Ex delegado principal, planta de Greenville",
      sub_ht: "Ansyen delege prensipal, izin Greenville",
      text_en: `When I needed the union, they were never there for me, and I was the chief steward at the Greenville plant. Raeford isn't a company I work for; it's a family I work with. This union, UFCW Local 1996 isn't it.`,
      text_es: `Cuando necesité al sindicato, nunca estuvieron ahí para mí, y yo era el delegado principal en la planta de Greenville. Raeford no es una empresa para la que trabajo; es una familia con la que trabajo. Este sindicato, UFCW Local 1996, no es la respuesta.`,
      text_ht: `Lè m te bezwen sendika a, yo pa t janm la pou mwen, e se mwen menm ki te delege prensipal nan izin Greenville la. Raeford se pa yon konpayi mwen travay pou li; se yon fanmi mwen travay avè l. Sendika sa a, UFCW Local 1996, se pa li.`
    },
    {
      name: "Eduardo",
      audio: "Eduardo%20HORF%20Testimonial.mp3",
      sub_en: "Vienna plant",
      sub_es: "Planta de Vienna",
      sub_ht: "Izin Vienna",
      text_en: `I feel more comfortable working here in Vienna than in Greenville. Here, Raeford is investing in a future. I would rather give the company time to grow and see how they create a lot of opportunity for a lot of people. I don't want a union.`,
      text_es: `Me siento más cómodo trabajando aquí en Vienna que en Greenville. Aquí Raeford está invirtiendo para un futuro. Prefiero darle a la compañía tiempo para que se desarrolle y ver cómo crean mucha oportunidad para mucha gente. Yo no quiero una unión.`,
      text_ht: `Mwen santi m pi alèz ap travay isit la nan Vienna pase nan Greenville. Isit la, Raeford ap envesti pou yon lavni. Mwen ta pito bay konpayi an tan pou l grandi epi wè kijan yo kreye anpil opòtinite pou anpil moun. Mwen pa vle yon sendika.`
    },
    {
      name: "Trivia",
      audio: "Trivia%20HORF%20Testimonial.mp3",
      sub_en: "Employee, Raeford Farms",
      sub_es: "Empleada de Raeford Farms",
      sub_ht: "Anplwaye Raeford Farms",
      text_en: `I'm not for the union, because the union can't do all the things that they promised. We've got an open door policy here, and Raeford can help us without us spending our own money.`,
      text_es: `No estoy a favor del sindicato, porque el sindicato no puede hacer todas las cosas que prometieron. Aquí tenemos una política de puertas abiertas, y Raeford puede ayudarnos sin que gastemos nuestro propio dinero.`,
      text_ht: `Mwen pa pou sendika a, paske sendika a pa ka fè tout bagay yo te pwomèt yo. Isit la nou gen yon politik pòt ouvè, epi Raeford ka ede nou san nou pa depanse pwòp lajan nou.`
    },
    {
      name: "Semika (Mika) Lawson",
      audio: null,
      sub_en: "21 years at the plant",
      sub_es: "21 años en la planta",
      sub_ht: "21 ane nan izin nan",
      text_en: `Where do I start... it's so much I can say with being in this chicken field for 21 yrs. This job has taught me a lot of things along the way. I started nights, moved to days, and jumped line to lines I knew nothing about. It was a lot, still I stood. House of Raeford came and a lot of people left. If I would had left I would not have got the chance to experience visiting another plant, running three optics, being able to stand and see what I have going on in my process. I'm thankful they gave us a chance because the doors could have been closed when Tyson left. I see that I used my own voice & never need anyone to speak for me. I totally feel as though the best is yet to come.`,
      text_es: `¿Por dónde empiezo? Hay tanto que puedo decir después de 21 años en este campo del pollo. Este trabajo me ha enseñado muchas cosas en el camino. Empecé en las noches, pasé a los días y cambié de una línea a otra sin saber nada. Fue mucho, pero aun así me mantuve firme. Llegó House of Raeford y mucha gente se fue. Si yo me hubiera ido, no habría tenido la oportunidad de visitar otra planta, de manejar tres máquinas ópticas, de poder pararme y ver todo lo que tengo en mi proceso. Estoy agradecida de que nos dieran una oportunidad, porque las puertas se pudieron haber cerrado cuando Tyson se fue. Veo que usé mi propia voz y nunca necesité que nadie hablara por mí. De verdad siento que lo mejor está por venir.`,
      text_ht: `Kote pou m kòmanse... gen anpil bagay mwen ka di apre 21 ane nan domèn poul sa a. Travay sa a aprann mwen anpil bagay sou wout la. Mwen te kòmanse lannwit, mwen pase nan lajounen, epi mwen sote soti nan yon liy ale nan lòt liy mwen pa t konn anyen sou yo. Se te anpil, men mwen kanpe fèm. House of Raeford vini epi anpil moun ale. Si m te ale, mwen pa t ap janm jwenn chans pou m vizite yon lòt izin, pou m opere twa machin optik, pou m ka kanpe epi wè tout sa m gen k ap pase nan pwosesis mwen. Mwen rekonesan yo te ban nou yon chans, paske pòt yo te ka fèmen lè Tyson te ale. Mwen wè mwen te sèvi ak pwòp vwa mwen epi mwen pa janm bezwen pèsonn pale pou mwen. Mwen vrèman santi pi bon bagay yo poko menm rive.`
    }
  ];

  var tUI = {
    en: { listen: "Listen to %s in their own words:", read: "Read aloud", stop: "Stop",
          discListen: "Listen to this page",
          readNote: "No recording yet. This reads the text above in a computer voice. It is not a recording of her." },
    es: { listen: "Escuche a %s en sus propias palabras:", read: "Leer en voz alta", stop: "Detener",
          discListen: "Escuchar esta página",
          readNote: "Aún no hay grabación. Esto lee el texto de arriba con una voz de computadora. No es una grabación de ella." },
    ht: { listen: "Koute %s ak pwòp pawòl li:", read: "Li awotvwa", stop: "Sispann",
          discListen: "Koute paj sa a",
          readNote: "Poko gen anrejistreman. Sa a li tèks anwo a ak yon vwa òdinatè. Se pa yon anrejistreman vwa li." }
  };

  function stopAllAudio() {
    try { window.speechSynthesis.cancel(); } catch (e) {}
    var box = document.getElementById("testi-cards");
    if (box) box.querySelectorAll("audio").forEach(function (a) { try { a.pause(); } catch (e) {} });
  }

  function renderTestimonials(lang) {
    var box = document.getElementById("testi-cards");
    stopAllAudio();
    box.innerHTML = "";
    people.forEach(function (p) {
      var fig = document.createElement("figure");
      fig.className = "testimonial";

      var bq = document.createElement("blockquote");
      bq.textContent = p["text_" + lang] || p.text_en;
      fig.appendChild(bq);

      var cap = document.createElement("figcaption");
      var nm = document.createElement("span");
      nm.className = "t-name";
      nm.textContent = p.name;
      var role = document.createElement("span");
      role.className = "t-role";
      role.textContent = p["sub_" + lang] || p.sub_en;
      cap.appendChild(nm);
      cap.appendChild(role);
      fig.appendChild(cap);

      if (p.audio) {
        var listen = document.createElement("p");
        listen.className = "t-listen";
        listen.textContent = tUI[lang].listen.replace("%s", p.name);
        var au = document.createElement("audio");
        au.controls = true;
        au.preload = "none";
        au.src = p.audio;
        au.setAttribute("aria-label", p.name + " testimonial");
        fig.appendChild(listen);
        fig.appendChild(au);
      } else {
        var note = document.createElement("p");
        note.className = "t-listen";
        note.textContent = tUI[lang].readNote;
        fig.appendChild(note);

        var row = document.createElement("div");
        row.className = "tts-row";
        var read = document.createElement("button");
        read.type = "button";
        read.className = "btn-read";
        read.textContent = tUI[lang].read;
        read.addEventListener("click", function () {
          try {
            window.speechSynthesis.cancel();
            var u = new SpeechSynthesisUtterance(p["text_" + lang] || p.text_en);
            u.lang = lang === "es" ? "es-ES" : (lang === "ht" ? "fr-FR" : "en-US");
            window.speechSynthesis.speak(u);
          } catch (e) {}
        });
        var stop = document.createElement("button");
        stop.type = "button";
        stop.className = "btn-stop";
        stop.textContent = tUI[lang].stop;
        stop.addEventListener("click", function () {
          try { window.speechSynthesis.cancel(); } catch (e) {}
        });
        row.appendChild(read);
        row.appendChild(stop);
        fig.appendChild(row);
      }

      box.appendChild(fig);
    });
  }

  var currentLang = "en";

  function setLang(code) {
    currentLang = code;
    var data = content[code] || content.en;
    document.documentElement.lang = data.lang;
    document.querySelectorAll("[data-k]").forEach(function (el) {
      var key = el.getAttribute("data-k");
      if (data[key] !== undefined) el.textContent = data[key];
    });
    document.querySelectorAll(".langs button").forEach(function (b) {
      b.setAttribute("aria-pressed", b.getAttribute("data-lang") === code ? "true" : "false");
    });
    var dl = document.getElementById("disc-listen");
    var ds = document.getElementById("disc-stop");
    if (dl) dl.textContent = tUI[code].discListen;
    if (ds) ds.textContent = tUI[code].stop;
    renderTestimonials(code);
  }

  document.getElementById("disc-listen").addEventListener("click", function () {
    try {
      if (window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); return; }
      stopAllAudio();
      var u = new SpeechSynthesisUtterance(content[currentLang].noticeSpoken);
      u.lang = currentLang === "es" ? "es-ES" : (currentLang === "ht" ? "fr-FR" : "en-US");
      window.speechSynthesis.speak(u);
    } catch (e) {}
  });
  document.getElementById("disc-stop").addEventListener("click", function () {
    try { window.speechSynthesis.cancel(); } catch (e) {}
  });

  document.querySelectorAll(".langs button").forEach(function (b) {
    b.addEventListener("click", function () { setLang(b.getAttribute("data-lang")); });
  });

  setLang("en");
</script>
</body>
</html>
